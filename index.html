<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Blackjack - Vite</title>
    </head>
    <body>
        <header class="titulo">BlackJack by Jorge Cedillo</header>
        <div class="row mt-2">
            <div id="botonesAccion" class="col text-center">
                <button id="btnIniciarNuevoJuego" class="btn btn-danger">Nuevo juego</button>
                <button id="btnPedirCarta" disabled="disabled" class="btn btn-primary">Pedir carta</button>
                <button id="btnDetenerJuego" disabled="disabled" class="btn btn-primary">Detener</button>
            </div>
        </div>

        <div class="row container">
            <div class="col">
                <h1>Jugador 1 - <small>0</small></h1>
                <div id="jugador-cartas" class="divCartas">
                    <!-- <img
                        class="carta"
                        src="assets/cartas/10C.png"
                        alt="cartas"
                    /> -->
                </div>
            </div>
        </div>

        <div class="row container mt-2"></div>
            <div class="col">
                <h1>Computadora - <small>0</small></h1>
                <div id="computadora-cartas" class="divCartas">
                    <!-- <img
                        class="carta"
                        src="assets/cartas/2C.png"
                        alt="cartas"
                    /> -->
                </div>
            </div>
        </div> 
        <div id="app"></div>
        <script type="module" src="/main.js"></script>
    </body>
</html>
